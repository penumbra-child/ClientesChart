replicaCount: 1

frontend:
  image: yurbendock/clientes-front
  tag: latest
  service:
    type: LoadBalancer
    port: 80
    containerPort: 80
  env:
    apiUrl: "http://api-service:3000/api"

api:
  image: yurbendock/clientes-backend
  tag: latest
  service:
    type: ClusterIP
    port: 3000
    containerPort: 3000
  env:
    dbPort: "3306"
    dbName: "pui_db"
    dbUser: "root"
    dbPassword: "password123"

mysql:
  image: mysql
  tag: "8.0"
  env:
    rootPassword: "password123"
    database: "pui_db"
  persistence:
    enabled: false
    size: 1Gi
  service:
    port: 3306
